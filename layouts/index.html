{{ define "title" }}botaemeveryday{{ end }}

{{ define "main" }}
<main class="home">

  <nav class="home-nav">
    <button class="theme-toggle" id="themeToggle" aria-label="переключить тему">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>

  <div class="home-center">

    <!-- Логотип -->
    <div class="logo-wrap" aria-label="botaemeveryday">
      <div class="logo-inner">
        <svg class="logo-ruled" preserveAspectRatio="none" viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="22%" x2="100%" y2="22%" stroke="var(--ruled)" stroke-width="1.2"/>
          <line x1="0" y1="44%" x2="100%" y2="44%" stroke="var(--ruled)" stroke-width="1.2"/>
          <line x1="0" y1="66%" x2="100%" y2="66%" stroke="var(--ruled)" stroke-width="1.2"/>
          <line x1="0" y1="88%" x2="100%" y2="88%" stroke="var(--ruled)" stroke-width="1.2"/>
        </svg>
        <span class="logo-text">
          <span class="logo-b">b</span>otaem<span class="logo-wavy">everyday
            <svg class="wavy-line" viewBox="0 0 220 12" xmlns="http://www.w3.org/2000/svg" height="12" aria-hidden="true">
              <path d="M0 6 Q14 0 28 6 Q42 12 56 6 Q70 0 84 6 Q98 12 112 6 Q126 0 140 6 Q154 12 168 6 Q182 0 196 6 Q210 12 220 6" fill="none" stroke="#FF6B4A" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </span>
        </span>
      </div>
    </div>

    <!-- Строка поиска -->
    <div class="search-wrap">
      <div class="search-box" id="searchBox">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          id="searchInput"
          placeholder="поиск по конспектам..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="поиск"
        />
        <button class="search-clear hidden" id="searchClear" aria-label="очистить">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="search-btns">
        <button class="btn" id="btnSearch">найти</button>
        <button class="btn" id="btnLucky">мне повезёт</button>
      </div>
    </div>

  </div>

  <footer class="home-footer">
    поиск по открытым конспектам · <a href="https://github.com/botaemeveryday/search" target="_blank" rel="noopener">github</a>
  </footer>

</main>

<!-- Страница результатов (скрыта изначально) -->
<div class="results-page hidden" id="resultsPage">
  {{ partial "results.html" . }}
</div>
{{ end }}

{{ define "pagefind" }}
<script>
  window.__pagefind__ = true;
</script>
<script src="/search/pagefind/pagefind-ui.js" defer></script>
{{ end }}
